name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repository-structure:
    name: Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          echo "Checking required files..."
          test -f README.md
          test -f docs/PRD.md
          test -f docs/ARCHITECTURE.md
          test -f docs/API.md
          test -f docs/DATABASE.md
          test -f docs/AGENT_RULES.md
          test -f docs/HANDOFF_TEMPLATE.md
          test -f backend-java/README.md
          test -f ai-service/README.md
          test -f frontend/README.md
          test -f .env.example
          test -f .gitignore
          test -f docker-compose.yml
          echo "All required files exist. Repository structure check passed."

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        working-directory: backend-java
        run: mvn test

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build
