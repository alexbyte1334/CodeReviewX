name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repository-structure:
    name: Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          echo "Checking required files..."
          test -f README.md
          test -f docs/PRD.md
          test -f docs/ARCHITECTURE.md
          test -f docs/API.md
          test -f docs/DATABASE.md
          test -f docs/STATIC_ANALYSIS.md
          test -f docs/SECURITY_CHECKLIST.md
          test -f docs/PROJECT_SUMMARY_AND_NEXT_STEPS.md
          test -f backend-java/README.md
          test -f ai-service/README.md
          test -f frontend/README.md
          test -f .env.example
          test -f .gitignore
          test -f .semgrep.yml
          test -f scripts/static-scan.mjs
          test -f scripts/secret-scan.mjs
          test -f scripts/dependency-scan.mjs
          test -f scripts/run-evals.mjs
          test -f docker-compose.yml
          echo "All required files exist. Repository structure check passed."

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run static analysis
        run: REQUIRE_SEMGREP=1 node scripts/static-scan.mjs

  evals:
    name: Evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run evals
        run: node scripts/run-evals.mjs

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        working-directory: backend-java
        run: mvn test

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build
