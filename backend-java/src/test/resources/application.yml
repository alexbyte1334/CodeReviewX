spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false

codereviewx:
  github:
    api-base-url: https://api.github.com
    token:
    timeout-seconds: 20
  review:
    provider: mimo
  ai:
    mimo:
      base-url: https://api.xiaomimimo.com/v1
      model: mimo-v2.5-pro
      api-key:
      planner-api-key: test-planner-key
      executor-api-key: test-executor-key
