spring:
  application:
    name: codereviewx-backend
  profiles:
    active: local
  datasource:
    url: jdbc:h2:file:./data/codereviewx;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

server:
  port: ${BACKEND_PORT:8080}

codereviewx:
  review:
    provider: ${CODEREVIEWX_REVIEW_PROVIDER:mimo}
  ai:
    mimo:
      base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1}
      model: ${MIMO_MODEL:mimo-v2.5-pro}
      api-key: ${MIMO_API_KEY:}
      timeout-seconds: ${MIMO_TIMEOUT_SECONDS:60}
